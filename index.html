<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>فۆرمی کارمەند - بازاری سامان شێخانی (لقی بەحرکە)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans Arabic', 'Segoe UI', Tahoma, system-ui, sans-serif;
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
            min-height: 100vh;
            padding: 1rem;
            direction: rtl;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        /* header card */
        .header-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.8rem 1.2rem;
            margin-bottom: 1.2rem;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .logo {
            width: 52px;
            height: 52px;
            background: linear-gradient(145deg, #059669, #10b981);
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.6rem auto;
            font-size: 1.9rem;
        }

        h1 {
            font-size: 1.4rem;
            color: #1f2937;
        }

        .sub {
            color: #059669;
            font-weight: 600;
            font-size: 0.75rem;
        }

        /* form card */
        .form-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
            margin-bottom: 1rem;
        }

        .section {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid #e9ecef;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: #065f46;
        }

        .section-icon {
            width: 28px;
            height: 28px;
            background: #ecfdf5;
            border-radius: 0.8rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 0.8rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #374151;
            font-size: 0.75rem;
        }

        .required {
            color: #ef4444;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 0.5rem 0.8rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 0.8rem;
            font-size: 0.8rem;
            font-family: inherit;
            background: #fafcff;
            transition: all 0.2s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #10b981;
            outline: none;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
            background: white;
        }

        textarea {
            resize: vertical;
            min-height: 55px;
        }

        .radio-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.3rem;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            font-weight: 500;
            background: #f1f5f9;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
        }

        .radio-option.selected {
            background: #10b981;
            color: white;
        }

        .radio-option input {
            width: 15px;
            height: 15px;
            margin: 0;
        }

        .file-zone {
            border: 1.5px dashed #cbd5e1;
            border-radius: 0.9rem;
            padding: 0.5rem;
            text-align: center;
            background: #fefce8;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .preview-img {
            margin-top: 0.5rem;
            max-width: 100%;
            max-height: 100px;
            border-radius: 0.8rem;
            object-fit: cover;
        }

        .error-text {
            color: #ef4444;
            font-size: 0.65rem;
            margin-top: 0.2rem;
        }

        .progress-bar {
            height: 5px;
            background: #e5e7eb;
            border-radius: 2rem;
            overflow: hidden;
            margin: 0.5rem 0 0.3rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #059669, #34d399);
            width: 0%;
            transition: width 0.2s;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        button {
            background: linear-gradient(145deg, #059669, #10b981);
            color: white;
            border: none;
            width: 100%;
            padding: 0.7rem;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 0.5rem;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            z-index: 1000;
            animation: fadeUp 0.2s ease;
            white-space: nowrap;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        footer {
            text-align: center;
            font-size: 0.6rem;
            color: #4b5563;
            margin: 1rem 0 0.2rem;
        }

        @media (max-width: 550px) {
            .section {
                padding: 0.8rem 1rem;
            }

            .radio-group {
                gap: 0.8rem;
            }
        }

        .two-cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        @media (max-width: 500px) {
            .two-cols {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
        }

        .logo img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header-card">
            <div class="logo"><img src="images/logo.jpeg" alt=""></div>
            <h1>بازاڕی سامان شێخانی</h1>
            <p class="sub">لقی بەحرکە · فۆرمی تۆمارکردنی کارمەند</p>
        </div>

        <div class="form-card" id="app">
            <div class="section">
                <div class="section-title"><span class="section-icon">👤</span> زانیاری تاکەکەسی</div>
                <div class="two-cols">
                    <div class="input-group">
                        <label>ناوی سیانی <span class="required">*</span></label>
                        <input type="text" id="fullName" placeholder="ناوی خۆت">
                        <div class="error-text" id="error-fullName"></div>
                    </div>
                    <div class="input-group">
                        <label>ژمارەی مۆبایل <span class="required">*</span></label>
                        <input type="tel" id="phone" placeholder="07XX XXX XXXX">
                        <div class="error-text" id="error-phone"></div>
                    </div>
                    <div class="input-group">
                        <label>نزیکترین شوێن <span class="required">*</span></label>
                        <input type="text" id="nearestLocation" placeholder="گوند/شار">
                        <div class="error-text" id="error-nearestLocation"></div>
                    </div>
                    <div class="input-group">
                        <label>تەمەن <span class="required">*</span></label>
                        <input type="number" id="age" min="16" max="70" placeholder="ساڵ">
                        <div class="error-text" id="error-age"></div>
                    </div>
                </div>
                <div class="input-group">
                    <label>ناونیشانی نیشتەجێبوون <span class="required">*</span></label>
                    <textarea id="address" rows="1" placeholder="ناونیشانی تەواو"></textarea>
                    <div class="error-text" id="error-address"></div>
                </div>
                <div class="two-cols">
                    <div class="input-group">
                        <label>📸 وێنەی تاکەکەسی</label>
                        <div class="file-zone" id="photoZone"><span>📸 کرتە بکە بۆ هەڵبژاردن</span>
                            <input type="file" id="personalPhoto" accept="image/*" style="display:none">
                        </div>
                        <img id="photoPreview" class="preview-img" style="display:none">
                    </div>
                    <div class="input-group">
                        <label>🪪 وێنەی کارتی نیشتیمانی</label>
                        <div class="file-zone" id="idZone"><span>🪪 کرتە بکە بۆ هەڵبژاردن</span>
                            <input type="file" id="idCardPhoto" accept="image/*" style="display:none">
                        </div>
                        <img id="idPreview" class="preview-img" style="display:none">
                    </div>
                </div>
            </div>

            <div class="section" style="background:#fff9ed">
                <div class="section-title"><span class="section-icon">💼</span> ئەزموونی کار</div>
                <div class="input-group">
                    <label>ئایا پێشتر کاری کردووە؟ <span class="required">*</span></label>
                    <div class="radio-group" id="expGroup">
                        <label class="radio-option"><input type="radio" name="hasExperience" value="بەڵێ"> بەڵێ</label>
                        <label class="radio-option"><input type="radio" name="hasExperience" value="نەخێر">
                            نەخێر</label>
                    </div>
                    <div class="error-text" id="error-hasExperience"></div>
                </div>
                <div id="experienceFields" style="display:none;">
                    <div class="two-cols">
                        <div class="input-group">
                            <label>شوێنی کاری پێشوو</label>
                            <input type="text" id="previousWorkplace" placeholder="ناوی شوێنی کار">
                            <div class="error-text" id="error-previousWorkplace"></div>
                        </div>
                        <div class="input-group">
                            <label>هۆکاری جێهێشتن</label>
                            <input type="text" id="leaveReason" placeholder="هۆکارەکە">
                            <div class="error-text" id="error-leaveReason"></div>
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label>توانای پەیوەندی <span class="required">*</span></label>
                    <div class="radio-group" id="commGroup">
                        <label class="radio-option"><input type="radio" name="communicationSkill" value="بەڵێ">
                            بەڵێ</label>
                        <label class="radio-option"><input type="radio" name="communicationSkill" value="نەخێر">
                            نەخێر</label>
                    </div>
                    <div class="error-text" id="error-communicationSkill"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title"><span class="section-icon">🎓</span> توانا و زانیاری</div>
                <div class="two-cols">
                    <div class="input-group">
                        <label>ئاستی خوێندن <span class="required">*</span></label>
                        <input type="text" id="education" placeholder="بڕوانامە">
                        <div class="error-text" id="error-education"></div>
                    </div>
                    <div class="input-group">
                        <label>زمانەکان <span class="required">*</span></label>
                        <input type="text" id="languages" placeholder="کوردی، عەرەبی، ...">
                        <div class="error-text" id="error-languages"></div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="stats-row"><span>📋 پێشکەوتنی فۆرم</span><span id="percentText">0%</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <button id="submitBtn">📨 ناردنی فۆرم بۆ تێلیگرام</button>
            </div>
        </div>
        <footer>© ٢٠٢٥ بازاڕی سامان شێخانی - لقی بەحرکە</footer>
    </div>

    <script>
        (function () {
            // DOM elements
            const fullName = document.getElementById('fullName');
            const address = document.getElementById('address');
            const phone = document.getElementById('phone');
            const nearestLocation = document.getElementById('nearestLocation');
            const age = document.getElementById('age');
            const personalPhotoInput = document.getElementById('personalPhoto');
            const idCardPhotoInput = document.getElementById('idCardPhoto');
            const photoPreview = document.getElementById('photoPreview');
            const idPreview = document.getElementById('idPreview');
            const photoZone = document.getElementById('photoZone');
            const idZone = document.getElementById('idZone');
            const hasExperienceRadios = document.querySelectorAll('input[name="hasExperience"]');
            const communicationRadios = document.querySelectorAll('input[name="communicationSkill"]');
            const expFieldsDiv = document.getElementById('experienceFields');
            const previousWorkplace = document.getElementById('previousWorkplace');
            const leaveReason = document.getElementById('leaveReason');
            const education = document.getElementById('education');
            const languages = document.getElementById('languages');
            const submitBtn = document.getElementById('submitBtn');
            const progressFill = document.getElementById('progressFill');
            const percentText = document.getElementById('percentText');

            let personalPhotoBase64 = null;
            let idCardPhotoBase64 = null;
            let personalFileName = '', idCardFileName = '';

            function updateRadioStyles() {
                document.querySelectorAll('.radio-option').forEach(opt => {
                    const radio = opt.querySelector('input');
                    if (radio && radio.checked) opt.classList.add('selected');
                    else opt.classList.remove('selected');
                });
            }
            document.querySelectorAll('.radio-option').forEach(opt => {
                opt.addEventListener('click', () => { const r = opt.querySelector('input'); if (r) r.click(); });
                const r = opt.querySelector('input');
                if (r) r.addEventListener('change', updateRadioStyles);
            });

            hasExperienceRadios.forEach(r => {
                r.addEventListener('change', (e) => {
                    if (e.target.value === 'بەڵێ') expFieldsDiv.style.display = 'block';
                    else { expFieldsDiv.style.display = 'none'; previousWorkplace.value = ''; leaveReason.value = ''; }
                    updateProgress();
                });
            });
            communicationRadios.forEach(r => r.addEventListener('change', updateProgress));

            photoZone.addEventListener('click', () => personalPhotoInput.click());
            idZone.addEventListener('click', () => idCardPhotoInput.click());

            personalPhotoInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 5 * 1024 * 1024) { showToast("قەبارەی وێنە زۆر گەورەیە", true); return; }
                    personalFileName = file.name;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        personalPhotoBase64 = ev.target.result;
                        photoPreview.src = personalPhotoBase64;
                        photoPreview.style.display = 'block';
                        document.querySelector('#photoZone span').innerText = '✅ وێنە هەڵبژێردرا';
                        updateProgress();
                    };
                    reader.readAsDataURL(file);
                }
            });
            idCardPhotoInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 5 * 1024 * 1024) { showToast("قەبارەی کارت زۆر گەورەیە", true); return; }
                    idCardFileName = file.name;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        idCardPhotoBase64 = ev.target.result;
                        idPreview.src = idCardPhotoBase64;
                        idPreview.style.display = 'block';
                        document.querySelector('#idZone span').innerText = '✅ کارت هەڵبژێردرا';
                        updateProgress();
                    };
                    reader.readAsDataURL(file);
                }
            });

            const requiredFieldsList = ['fullName', 'address', 'phone', 'nearestLocation', 'age', 'hasExperience', 'communicationSkill', 'education', 'languages'];
            function getFieldValue(fieldId) {
                if (fieldId === 'hasExperience') {
                    let s = null; hasExperienceRadios.forEach(r => { if (r.checked) s = r.value; }); return s;
                }
                if (fieldId === 'communicationSkill') {
                    let s = null; communicationRadios.forEach(r => { if (r.checked) s = r.value; }); return s;
                }
                const el = document.getElementById(fieldId);
                return el ? el.value.trim() : '';
            }
            function updateProgress() {
                let completed = 0;
                for (let f of requiredFieldsList) {
                    let val = getFieldValue(f);
                    if (val && val !== '') completed++;
                }
                let photoBonus = (personalPhotoBase64 ? 1 : 0) + (idCardPhotoBase64 ? 1 : 0);
                let totalBase = requiredFieldsList.length;
                let totalPossible = totalBase + 2;
                let totalScore = completed + photoBonus;
                let percent = Math.min(100, Math.floor((totalScore / totalPossible) * 100));
                progressFill.style.width = percent + '%';
                percentText.innerText = percent + '%';
            }

            function validateForm() {
                let isValid = true;
                const errors = {};
                if (!fullName.value.trim()) { errors.fullName = "ناوی سیانی پێویستە"; isValid = false; }
                if (!address.value.trim()) { errors.address = "ناونیشان پێویستە"; isValid = false; }
                const phoneVal = phone.value.trim().replace(/[\s-]/g, '');
                if (!phoneVal || !/^(07[3-9]\d{8}|07[0-2]\d{8})$/.test(phoneVal)) { errors.phone = "ژمارەی تەلەفۆنی دروست بنووسە"; isValid = false; }
                if (!nearestLocation.value.trim()) { errors.nearestLocation = "نزیکترین شوێن پێویستە"; isValid = false; }
                const ageVal = parseInt(age.value);
                if (!age.value || ageVal < 16 || ageVal > 70) { errors.age = "تەمەن لە ١٦-٧٠ ساڵ"; isValid = false; }
                let hasExpSel = false; hasExperienceRadios.forEach(r => { if (r.checked) hasExpSel = true; });
                if (!hasExpSel) { errors.hasExperience = "تکایە هەڵبژێرە"; isValid = false; }
                let commSel = false; communicationRadios.forEach(r => { if (r.checked) commSel = true; });
                if (!commSel) { errors.communicationSkill = "توانای پەیوەندی پێویستە"; isValid = false; }
                if (!education.value.trim()) { errors.education = "ئاستی خوێندن پێویستە"; isValid = false; }
                if (!languages.value.trim()) { errors.languages = "زمانەکان پێویستن"; isValid = false; }
                if (hasExpSel && hasExperienceRadios[0].checked) {
                    if (!previousWorkplace.value.trim()) { errors.previousWorkplace = "شوێنی کاری پێشوو پێویستە"; isValid = false; }
                    if (!leaveReason.value.trim()) { errors.leaveReason = "هۆکاری جێهێشتن پێویستە"; isValid = false; }
                }
                for (let k in errors) {
                    const errDiv = document.getElementById(`error-${k}`);
                    if (errDiv) errDiv.innerText = errors[k];
                }
                document.querySelectorAll('.error-text').forEach(div => {
                    const key = div.id.replace('error-', '');
                    if (!errors[key]) div.innerText = '';
                });
                return isValid;
            }

            function showToast(msg, isErr = false) {
                let toast = document.createElement('div');
                toast.className = 'toast';
                toast.style.background = isErr ? '#b91c1c' : '#065f46';
                toast.innerText = msg;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2800);
            }

            // ---------- PDF generator (compact, single page A4 perfect) ----------
            async function generateCompactPDF(formData) {
                // Create an offscreen container exactly for A4 width (210mm ≈ 800px at 96dpi)
                const container = document.createElement('div');
                container.dir = 'rtl';
                container.style.fontFamily = "'Noto Sans Arabic', 'Segoe UI', Tahoma, sans-serif";
                container.style.backgroundColor = '#ffffff';
                container.style.width = '800px';
                container.style.padding = '20px 24px';
                container.style.borderRadius = '20px';
                container.style.fontSize = '11px';
                container.style.lineHeight = '1.4';
                container.style.color = '#1e293b';

                // Build HTML content – optimized to fit in one A4 page
                const hasExpVal = formData.hasExperience === 'بەڵێ';
                const photosHtml = [];
                if (personalPhotoBase64) photosHtml.push(`<div style="width:100%; margin-top:12px; text-align:center;"><strong style="font-size:10px;">📸 وێنەی تاکەکەسی</strong><br><img src="${personalPhotoBase64}" style="max-width:100%; max-height:140px; border-radius:12px; border:1px solid #ddd;"></div>`);
                if (idCardPhotoBase64) photosHtml.push(`<div style="width:100%; margin-top:12px; text-align:center;"><strong style="font-size:10px;">🪪 کارتی نیشتیمانی</strong><br><img src="${idCardPhotoBase64}" style="max-width:100%; max-height:140px; border-radius:12px; border:1px solid #ddd;"></div>`);

                container.innerHTML = `
                <div style="text-align:center; margin-bottom:14px;">
                    <div style="font-size:36px;">🏪</div>
                    <h2 style="color:#059669; margin:2px 0; font-size:20px;">بازاڕی سامان شێخانی</h2>
                    <p style="color:#475569; margin:0; font-size:11px;">لقی بەحرکە · فۆرمی کارمەند</p>
                    <hr style="margin:8px 0;">
                </div>
                <table style="width:100%; border-collapse:collapse; margin-bottom:6px;">
                    <tr style="background:#ecfdf5;"><td colspan="2" style="padding:6px 10px; font-weight:bold; border-radius:12px;">👤 زانیاری تاکەکەسی</td></tr>
                    <tr><td style="padding:4px 8px; width:35%; font-weight:600;">ناوی سیانی:</td><td style="padding:4px 8px;">${escapeHtml(formData.fullName)}</td></tr>
                    <tr><td style="padding:4px 8px; font-weight:600;">ناونیشان:</td><td style="padding:4px 8px;">${escapeHtml(formData.address)}</td></tr>
                    <tr><td style="padding:4px 8px; font-weight:600;">مۆبایل:</td><td style="padding:4px 8px;">${escapeHtml(formData.phone)}</td></tr>
                    <tr><td style="padding:4px 8px; font-weight:600;">نزیکترین شوێن:</td><td style="padding:4px 8px;">${escapeHtml(formData.nearestLocation)}</td></tr>
                    <tr><td style="padding:4px 8px; font-weight:600;">تەمەن:</td><td style="padding:4px 8px;">${escapeHtml(formData.age)} ساڵ</td></tr>
                </table>
                <table style="width:100%; border-collapse:collapse; margin-bottom:6px; background:#fff7ed;">
                    <tr style="background:#fef3c7;"><td colspan="2" style="padding:5px 10px; font-weight:bold;">💼 ئەزموونی کار</td></tr>
                    <tr><td style="padding:4px 8px; width:35%; font-weight:600;">ئەزموونی پێشوو:</td><td style="padding:4px 8px;">${escapeHtml(formData.hasExperience)}</td></tr>
                    ${hasExpVal ? `
                    <tr><td style="padding:4px 8px; font-weight:600;">شوێنی کاری پێشوو:</td><td style="padding:4px 8px;">${escapeHtml(formData.previousWorkplace || '-')}</td></tr>
                    <tr><td style="padding:4px 8px; font-weight:600;">هۆکاری جێهێشتن:</td><td style="padding:4px 8px;">${escapeHtml(formData.leaveReason || '-')}</td></tr>
                    ` : ''}
                    <tr><td style="padding:4px 8px; font-weight:600;">توانای پەیوەندی:</td><td style="padding:4px 8px;">${escapeHtml(formData.communicationSkill)}</td></tr>
                </table>
                <table style="width:100%; border-collapse:collapse;">
                    <tr style="background:#f3e8ff;"><td colspan="2" style="padding:5px 10px; font-weight:bold;">🎓 توانا و زانیاری</td></tr>
                    <tr><td style="padding:4px 8px; width:35%; font-weight:600;">ئاستی خوێندن:</td><td style="padding:4px 8px;">${escapeHtml(formData.education)}</td></tr>
                    <tr><td style="padding:4px 8px; font-weight:600;">زمانەکان:</td><td style="padding:4px 8px;">${escapeHtml(formData.languages)}</td></tr>
                </table>
                <div style="margin-top:12px; text-align:center; border-top:1px solid #e2e8f0; padding-top:8px; font-size:9px; color:#64748b;">
                    📅 کاتی ناردن: ${new Date().toLocaleString('ku-IR')}<br>
                    بازاڕی سامان شێخانی - لقی بەحرکە
                </div>
                <div style="margin-top:10px; text-align:center;">${photosHtml.join('')}</div>
            `;
                document.body.appendChild(container);
                container.style.position = 'absolute';
                container.style.left = '-9999px';
                container.style.top = '0';
                await new Promise(r => setTimeout(r, 150));

                const canvas = await html2canvas(container, {
                    scale: 2.2,
                    backgroundColor: '#ffffff',
                    logging: false,
                    useCORS: true
                });
                document.body.removeChild(container);

                const imgData = canvas.toDataURL('image/jpeg', 0.92);
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const imgWidth = 210;  // A4 width in mm
                const pageHeight = 297;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                let position = 0;
                pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
                if (imgHeight > pageHeight) {
                    let heightLeft = imgHeight - pageHeight;
                    while (heightLeft > 0) {
                        position = heightLeft - imgHeight;
                        pdf.addPage();
                        pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
                        heightLeft -= pageHeight;
                    }
                }
                return pdf.output('blob');
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
            }

            async function sendToTelegram(formDataObj) {
                const BOT_TOKEN = "8719298497:AAGupQKXAOdwFCM9Ug1Fh0FC-O_qNC_0mVk";
                const CHAT_ID = "1719530760";
                if (!window.jspdf || !window.html2canvas) throw new Error('تکایە چەند چرکەیەک بوەستە، پەڕە تەواو بارنەبووە');
                const pdfBlob = await generateCompactPDF(formDataObj);
                const fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('document', pdfBlob, 'Employee_Form_Saman.pdf');
                fd.append('caption', `✅ فۆرمی نوێی کارمەند\n👤 ناو: ${formDataObj.fullName}\n📱 تەلەفۆن: ${formDataObj.phone}`);
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', body: fd });
                if (!res.ok) {
                    const errData = await res.json();
                    throw new Error(errData.description || 'هەڵەی تێلیگرام');
                }
                return true;
            }

            submitBtn.addEventListener('click', async () => {
                if (!validateForm()) {
                    showToast("تکایە هەموو خانە پێویستەکان پڕبکەرەوە", true);
                    return;
                }
                let hasExp = null; hasExperienceRadios.forEach(r => { if (r.checked) hasExp = r.value; });
                let commSkill = null; communicationRadios.forEach(r => { if (r.checked) commSkill = r.value; });
                const formObj = {
                    fullName: fullName.value.trim(),
                    address: address.value.trim(),
                    phone: phone.value.trim().replace(/[\s-]/g, ''),
                    nearestLocation: nearestLocation.value.trim(),
                    age: age.value,
                    hasExperience: hasExp,
                    previousWorkplace: (hasExp === 'بەڵێ') ? previousWorkplace.value.trim() : '',
                    leaveReason: (hasExp === 'بەڵێ') ? leaveReason.value.trim() : '',
                    communicationSkill: commSkill,
                    education: education.value.trim(),
                    languages: languages.value.trim()
                };
                submitBtn.disabled = true;
                submitBtn.innerText = "⏳ دەنێردرێت ...";
                try {
                    await sendToTelegram(formObj);
                    showToast("✅ فۆرمەکە بە سەرکەوتوویی نێردرا!");
                    // reset form
                    fullName.value = ''; address.value = ''; phone.value = ''; nearestLocation.value = '';
                    age.value = ''; education.value = ''; languages.value = '';
                    previousWorkplace.value = ''; leaveReason.value = '';
                    hasExperienceRadios.forEach(r => r.checked = false);
                    communicationRadios.forEach(r => r.checked = false);
                    expFieldsDiv.style.display = 'none';
                    personalPhotoBase64 = null; idCardPhotoBase64 = null;
                    photoPreview.style.display = 'none'; idPreview.style.display = 'none';
                    personalPhotoInput.value = ''; idCardPhotoInput.value = '';
                    document.querySelector('#photoZone span').innerText = '📸 کرتە بکە بۆ هەڵبژاردن';
                    document.querySelector('#idZone span').innerText = '🪪 کرتە بکە بۆ هەڵبژاردن';
                    updateRadioStyles(); updateProgress();
                } catch (err) {
                    showToast(err.message || "هەڵە ڕوویدا، دووبارە هەوڵبدەرەوە", true);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "📨 ناردنی فۆرم بۆ تێلیگرام";
                }
            });

            const allInputs = [fullName, address, phone, nearestLocation, age, education, languages, previousWorkplace, leaveReason];
            allInputs.forEach(inp => inp && inp.addEventListener('input', updateProgress));
            updateProgress();

            // load libraries
            function loadScript(src) {
                return new Promise((res, rej) => {
                    const s = document.createElement('script');
                    s.src = src; s.onload = res; s.onerror = () => rej(new Error(`load fail ${src}`));
                    document.head.appendChild(s);
                });
            }
            Promise.all([
                loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'),
                loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js')
            ]).catch(e => console.warn("library warning", e));
        })();
    </script>
